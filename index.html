    <style>
      :root {
        color-scheme: dark;
        --intro-bg: #04070d;
        --intro-text: #eef3ff;
        --intro-muted: rgba(220, 232, 255, 0.72);
        --intro-blue: #5ac8fa;
        --intro-purple: #7c3aed;
        --intro-transition: 760ms cubic-bezier(0.22, 1, 0.36, 1);
      }

      body {
        margin: 0;
        background: var(--intro-bg);
        font-family: "Space Grotesk", sans-serif;
      }

      #root {
        min-height: 100vh;
      }

      html.intro-pending body,
      body.intro-active {
        overflow: hidden;
      }

      html.intro-pending #root,
      body.intro-active #root {
        opacity: 0;
        pointer-events: none;
        transform: scale(1.01);
        transition: opacity var(--intro-transition), transform var(--intro-transition);
      }

      .intro-screen {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: #02040a;
        isolation: isolate;
        z-index: 9999;
        transform: scale(1);
        opacity: 1;
        transition: opacity var(--intro-transition), transform var(--intro-transition);
      }

      html.intro-pending .intro-screen,
      body.intro-active .intro-screen {
        display: flex;
      }

      body.intro-exiting .intro-screen {
        opacity: 0;
        transform: scale(1.035);
      }

      body.intro-exiting #root {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      .intro-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center center;
        filter: brightness(1.05) contrast(1.00) saturate(1.00);
        backface-visibility: hidden;
        transform: translateZ(0) scale(1);
        will-change: transform;
        transition: transform var(--intro-transition), filter var(--intro-transition);
      }

      body.intro-exiting .intro-video {
        transform: translateZ(0) scale(1.03);
        filter: brightness(0.9) blur(2px);
      }

      .intro-overlay {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(13, 24, 58, 0.01) 0%, rgba(1, 15, 54, 0.03) 50%, rgba(18, 30, 68, 0.1) 100%);
        pointer-events: none;
      }

      .intro-blackout {
        position: absolute;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--intro-transition);
        z-index: 1;
      }

      body.intro-held .intro-overlay {
        background:
          linear-gradient(180deg, rgba(2, 4, 10, 0.07) 0%, rgba(2, 4, 10, 0.14) 46%, rgba(2, 4, 10, 0.58) 100%),
          radial-gradient(circle at 50% 22%, rgba(90, 200, 250, 0.1), transparent 34%),
          radial-gradient(circle at 82% 28%, rgba(124, 58, 237, 0.06), transparent 28%);
      }

      body.intro-held .intro-video {
        filter: brightness(1) contrast(1.06) saturate(1.04);
      }

      body.intro-exiting .intro-blackout {
        opacity: 0.7;
      }

      .intro-layout {
        position: relative;
        z-index: 2;
        width: 100%;
        min-height: 100dvh;
        display: grid;
        grid-template-rows: minmax(15rem, 60vh) minmax(15rem, 40vh);
      }

      .intro-media-stage {
        position: relative;
        min-height: min(60vh, 44rem);
        overflow: hidden;
        background:
          radial-gradient(circle at top, rgba(90, 200, 250, 0.06), transparent 42%),
          #02040a;
      }
.intro-bottom-stack {
  padding-bottom: env(safe-area-inset-bottom);
}
      .intro-ui {
        position: relative;
        z-index: 2;
        width: min(100%, 1100px);
        margin: 0 auto;
        padding: 1rem 1.4rem calc(max(1rem, env(safe-area-inset-bottom)) + 0.85rem);
        box-sizing: border-box;
      }

      .intro-copy {
        width: 100%;
        margin: 0;
        text-align: center;
        transform: translateY(0);
        transition: transform var(--intro-transition), opacity var(--intro-transition);
      }

      body.intro-exiting .intro-copy {
        opacity: 0;
        transform: translateY(-10px);
      }

      .intro-kicker {
        display: inline-block;
        margin: 0 0 0.9rem;
        color: var(--intro-muted);
        font: 500 0.82rem/1 "Space Grotesk", sans-serif;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .intro-title {
        margin: 0;
        color: var(--intro-text);
        font: 700 clamp(2rem, 5vw, 4.8rem) / 0.98 "Sora", sans-serif;
        letter-spacing: -0.05em;
        text-shadow: 0 0 28px rgba(90, 200, 250, 0.2);
      }

      .intro-type {
        margin: 1.15rem auto 0;
        min-height: 1.9rem;
        color: rgba(234, 243, 255, 0.92);
        font: 500 clamp(1.05rem, 2vw, 1.3rem) / 1.4 "Space Grotesk", sans-serif;
        letter-spacing: 0.08em;
      }

      .intro-type::after {
        content: "";
        display: inline-block;
        width: 0.08em;
        height: 1.05em;
        margin-left: 0.18em;
        vertical-align: -0.12em;
        background: rgba(90, 200, 250, 0.95);
        box-shadow: 0 0 12px rgba(90, 200, 250, 0.75);
        animation: cursorBlink 1s steps(1) infinite;
      }

      .intro-bottom-stack {
        width: 100%;
        transform: translateY(0);
        transition: transform var(--intro-transition), opacity var(--intro-transition);
      }

      body.intro-exiting .intro-bottom-stack {
        opacity: 0;
        transform: translateY(16px);
      }

      .ai-orb-button {
        position: relative;
        display: grid;
        place-items: center;
        width: 132px;
        height: 132px;
        min-height: 44px;
        padding: 0;
        border: 1px solid rgba(126, 146, 255, 0.45);
        border-radius: 50%;
        background:
          radial-gradient(circle at 34% 26%, rgba(255, 255, 255, 0.34), rgba(255, 255, 255, 0.08) 12%, transparent 20%),
          radial-gradient(circle at 50% 38%, rgba(139, 227, 255, 0.32), rgba(90, 200, 250, 0.18) 28%, rgba(34, 23, 81, 0.18) 52%, rgba(7, 11, 24, 0.98) 74%),
          linear-gradient(180deg, rgba(132, 219, 255, 0.12), rgba(7, 11, 24, 0) 28%);
        color: var(--intro-text);
        font: 600 0.96rem/1 "Space Grotesk", sans-serif;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow:
          inset 0 14px 18px rgba(255, 255, 255, 0.08),
          inset 0 -18px 28px rgba(4, 8, 18, 0.78),
          inset 0 0 30px rgba(90, 200, 250, 0.12),
          0 18px 30px rgba(2, 4, 10, 0.5),
          0 0 34px rgba(90, 200, 250, 0.24),
          0 0 84px rgba(124, 58, 237, 0.18);
        backdrop-filter: blur(14px);
        overflow: hidden;
        transform: translateY(0) perspective(500px) rotateX(0deg);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease, filter 0.25s ease;
        animation: orbPulse 3s ease-in-out infinite;
      }

      .ai-orb-button > span {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        z-index: 1;
        text-align: center;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.18),
          0 3px 10px rgba(6, 10, 20, 0.7),
          0 0 18px rgba(90, 200, 250, 0.4);
      }

      .ai-orb-button::before {
        content: "";
        position: absolute;
        inset: -12%;
        border: 1px solid rgba(131, 167, 255, 0.3);
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(90, 200, 250, 0.14);
        opacity: 0.66;
        transform: scale(0.92);
        animation: orbRing 2.8s ease-in-out infinite;
      }

      .ai-orb-button::after {
        content: "";
        position: absolute;
        inset: 10%;
        border-radius: 50%;
        background:
          radial-gradient(circle at 36% 30%, rgba(255, 255, 255, 0.34), transparent 20%),
          radial-gradient(circle at 50% 56%, rgba(90, 200, 250, 0.3), rgba(124, 58, 237, 0.12) 52%, transparent 74%);
        filter: blur(10px);
        opacity: 0.88;
        pointer-events: none;
      }

      .ai-orb-button:hover,
      .ai-orb-button:focus-visible {
        transform: translateY(-2px) perspective(500px) rotateX(8deg) scale(1.05);
        border-color: rgba(126, 146, 255, 0.7);
        box-shadow:
          inset 0 14px 18px rgba(255, 255, 255, 0.12),
          inset 0 -18px 28px rgba(4, 8, 18, 0.76),
          inset 0 0 36px rgba(90, 200, 250, 0.18),
          0 24px 36px rgba(2, 4, 10, 0.54),
          0 0 46px rgba(90, 200, 250, 0.42),
          0 0 112px rgba(124, 58, 237, 0.34);
        filter: saturate(1.08);
        outline: none;
      }

      .ai-orb-button:hover::before,
      .ai-orb-button:focus-visible::before {
        opacity: 0.95;
      }

      .ai-orb-button[disabled] {
        cursor: default;
        opacity: 0.8;
        animation-play-state: paused;
      }

      body.intro-exiting .ai-orb-button {
        transform: translateY(6px) scale(0.94);
        filter: saturate(0.9);
      }

      .ai-orb-button:active {
        transform: translateY(1px) perspective(500px) rotateX(-6deg) scale(0.98);
        box-shadow:
          inset 0 10px 16px rgba(255, 255, 255, 0.08),
          inset 0 -20px 26px rgba(4, 8, 18, 0.84),
          0 12px 20px rgba(2, 4, 10, 0.44),
          0 0 28px rgba(90, 200, 250, 0.2),
          0 0 72px rgba(124, 58, 237, 0.2);
      }

      .ai-orb-ripple {
        position: absolute;
        inset: 50% auto auto 50%;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0.2);
        background: radial-gradient(circle, rgba(255, 255, 255, 0.6), rgba(90, 200, 250, 0.26) 48%, transparent 72%);
        opacity: 0.9;
        pointer-events: none;
        animation: orbRipple 0.55s ease-out forwards;
      }

      .intro-bottom-card {
        width: 100%;
        position: relative;
        padding: 1.2rem 1.2rem 1.1rem;
        border: 1px solid rgba(150, 170, 255, 0.22);
        border-radius: 30px;
        background:
          linear-gradient(180deg, rgba(14, 18, 34, 0.9), rgba(7, 10, 20, 0.96)),
          radial-gradient(circle at top, rgba(90, 200, 250, 0.08), transparent 48%);
        box-shadow:
          0 22px 48px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 255, 255, 0.05),
          inset 0 0 36px rgba(90, 200, 250, 0.04);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        transition: transform var(--intro-transition), opacity var(--intro-transition), box-shadow var(--intro-transition);
      }

      .intro-bottom-card::before {
        content: "";
        position: absolute;
        inset: 0 18px auto;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(163, 193, 255, 0.42), transparent);
        opacity: 0.9;
      }

      .intro-bottom-card::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: inherit;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.05), transparent 24%, transparent 70%, rgba(90, 200, 250, 0.04));
        pointer-events: none;
      }

      .intro-bottom-card-trace {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        overflow: hidden;
      }

      .intro-bottom-card-trace::before {
        content: "";
        position: absolute;
        top: 0;
        left: -28%;
        width: 34%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(90, 200, 250, 0.02) 18%,
          rgba(255, 255, 255, 0.2) 50%,
          rgba(124, 58, 237, 0.1) 82%,
          transparent 100%
        );
        filter: blur(10px);
        opacity: 0.9;
        animation: cardTrace 4.8s ease-in-out infinite;
      }

      body.intro-exiting .intro-bottom-card {
        transform: translateY(10px) scale(0.985);
        box-shadow: 0 10px 22px rgba(0, 0, 0, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .intro-bottom-inner {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(220px, 0.8fr);
        align-items: center;
        gap: 1.4rem;
      }

      .intro-bottom-content {
        display: flex;
        align-items: center;
        gap: 1.1rem;
        min-width: 0;
      }

      .intro-bottom-copy {
        min-width: 0;
        text-align: left;
      }

      .intro-bottom-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.42rem 0.72rem;
        border: 1px solid rgba(138, 171, 255, 0.22);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.03);
        color: rgba(230, 238, 255, 0.88);
        font: 600 0.74rem/1 "Space Grotesk", sans-serif;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .intro-bottom-badge::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(90, 200, 250, 1), rgba(124, 58, 237, 0.8));
        box-shadow: 0 0 12px rgba(90, 200, 250, 0.7);
      }

      .intro-bottom-label {
        margin: 0.8rem 0 0;
        color: rgba(220, 232, 255, 0.62);
        font: 500 0.75rem/1.2 "Space Grotesk", sans-serif;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      .intro-bottom-title {
        margin: 0.4rem 0 0;
        color: var(--intro-text);
        font: 700 clamp(1.25rem, 2vw, 1.55rem) / 1.12 "Sora", sans-serif;
        letter-spacing: -0.03em;
      }

      .intro-bottom-subtitle {
        margin: 0.5rem 0 0;
        color: rgba(226, 235, 255, 0.76);
        font: 500 clamp(0.94rem, 1.25vw, 1.02rem) / 1.55 "Space Grotesk", sans-serif;
        max-width: 34rem;
      }

      .intro-bottom-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin-top: 0.85rem;
      }

      .intro-bottom-chip {
        display: inline-flex;
        align-items: center;
        padding: 0.4rem 0.72rem;
        border: 1px solid rgba(138, 171, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.025);
        color: rgba(223, 233, 255, 0.74);
        font: 500 0.76rem/1 "Space Grotesk", sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .intro-bottom-action {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.65rem;
        flex-shrink: 0;
        justify-self: center;
      }

      .intro-bottom-action::before {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 190px;
        height: 190px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle, rgba(90, 200, 250, 0.22), rgba(124, 58, 237, 0.1) 42%, transparent 72%);
        filter: blur(22px);
        opacity: 0.9;
        pointer-events: none;
      }

      .intro-orb-label {
        position: relative;
        z-index: 1;
        color: rgba(220, 232, 255, 0.72);
        font: 600 0.72rem/1 "Space Grotesk", sans-serif;
        letter-spacing: 0.22em;
        text-transform: uppercase;
      }

      @media (max-width: 1024px) {
        .intro-layout {
          grid-template-rows: minmax(18rem, 58vh) minmax(18rem, 42vh);
        }

        .intro-ui {
          width: min(100%, 940px);
          padding: 0.95rem 1.1rem calc(max(0.95rem, env(safe-area-inset-bottom)) + 0.75rem);
        }

        .intro-title {
          font-size: clamp(1.75rem, 4.8vw, 3rem);
        }

        .intro-type {
          font-size: clamp(0.92rem, 1.6vw, 1.08rem);
          min-height: 1.55rem;
        }

        .intro-bottom-card {
          padding: 1rem;
        }

        .intro-bottom-inner {
          grid-template-columns: minmax(0, 1fr) 220px;
          gap: 1rem;
        }

        .intro-bottom-title {
          font-size: 1.12rem;
        }

        .intro-bottom-subtitle {
          font-size: 0.9rem;
        }
      }

      @media (max-width: 720px) {
        .intro-layout {
          grid-template-rows: minmax(15rem, 60svh) minmax(15rem, 40svh);
        }

        .intro-media-stage {
          aspect-ratio: auto;
          min-height: min(60svh, 27rem);
        }

        .intro-video {
          object-fit: contain;
        }

        .intro-ui {
          width: 100%;
          padding: 0.85rem 0.9rem max(1rem, env(safe-area-inset-bottom));
          background: linear-gradient(180deg, rgba(5, 8, 18, 0.96), rgba(3, 6, 14, 1));
        }

        .intro-copy {
          width: 100%;
          margin-bottom: 0.9rem;
        }

        .intro-title {
          font-size: clamp(1.45rem, 7vw, 2.2rem);
        }

        .intro-type {
          min-height: 1.3rem;
          font-size: 0.82rem;
          letter-spacing: 0.03em;
        }

        .ai-orb-button {
          width: 104px;
          height: 104px;
          font-size: 0.78rem;
        }

        .intro-bottom-card {
          width: 100%;
          border-radius: 22px;
          padding: 1rem 0.9rem 0.95rem;
        }

        .intro-bottom-title {
          font-size: 0.98rem;
        }

        .intro-bottom-label {
          font-size: 0.72rem;
          letter-spacing: 0.16em;
        }

        .intro-bottom-inner,
        .intro-bottom-content {
          flex-direction: column;
          align-items: center;
          text-align: center;
        }

        .intro-bottom-inner {
          display: flex;
          grid-template-columns: none;
          gap: 1rem;
        }

        .intro-bottom-copy {
          text-align: center;
        }

        .intro-bottom-subtitle {
          font-size: 0.82rem;
          max-width: 100%;
        }

        .intro-bottom-meta {
          justify-content: center;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .intro-screen,
        #root,
        .ai-orb-button,
        .intro-copy,
        .intro-blackout,
        .intro-video {
          transition: none;
        }

        .intro-type::after {
          animation: none;
        }

      }

      @keyframes cursorBlink {
        0%,
        45% {
          opacity: 1;
        }
        50%,
        100% {
          opacity: 0;
        }
      }

      @keyframes orbPulse {
        0%,
        100% {
          box-shadow:
            inset 0 0 30px rgba(90, 200, 250, 0.18),
            0 0 34px rgba(90, 200, 250, 0.24),
            0 0 84px rgba(124, 58, 237, 0.18);
        }
        50% {
          box-shadow:
            inset 0 0 36px rgba(90, 200, 250, 0.24),
            0 0 46px rgba(90, 200, 250, 0.34),
            0 0 108px rgba(124, 58, 237, 0.3);
        }
      }

      @keyframes orbRing {
        0%,
        100% {
          transform: scale(0.9);
          opacity: 0.58;
        }
        50% {
          transform: scale(1.08);
          opacity: 0.92;
        }
      }

      @keyframes orbRipple {
        0% {
          transform: translate(-50%, -50%) scale(0.2);
          opacity: 0.88;
        }
        100% {
          transform: translate(-50%, -50%) scale(6.2);
          opacity: 0;
        }
      }

      @keyframes cardTrace {
        0%,
        100% {
          transform: translateX(0);
          opacity: 0;
        }
        12% {
          opacity: 0.75;
        }
        50% {
          transform: translateX(290%);
          opacity: 0.95;
        }
        72% {
          opacity: 0.35;
        }
      }

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://careerwiki-site.vercel.app/#organization",
            "name": "Career Wiki",
            "url": "https://careerwiki-site.vercel.app/"
          },
          {
            "@type": "WebSite",
            "@id": "https://careerwiki-site.vercel.app/#website",
            "url": "https://careerwiki-site.vercel.app/",
            "name": "Career Wiki",
            "publisher": { "@id": "https://careerwiki-site.vercel.app/#organization" },
            "inLanguage": "en-IN"
          }
        ]
      }
    </script>
  </head>

  <body>
    <div class="intro-screen" id="introScreen" aria-hidden="true">
      <div class="intro-layout">
        <div class="intro-media-stage">
          <video
            class="intro-video"
            id="introVideo"
            autoplay
            muted
            playsinline
            preload="auto"
          >
            <source src="/assets/video/careerwiki-entry.mp4" type="video/mp4" />
          </video>
          <div class="intro-overlay"></div>
          <div class="intro-blackout"></div>
        </div>

        <div class="intro-ui">
          <div class="intro-bottom-stack">
            <div class="intro-copy">
              <p class="intro-kicker">CareerWiki System</p>
              <h1 class="intro-title">Your future begins with clarity.</h1>
              <p class="intro-type" id="introTypeLine" aria-live="polite"></p>
            </div>

            <div class="intro-bottom-card">
              <div class="intro-bottom-card-trace"></div>
              <div class="intro-bottom-inner">
                <div class="intro-bottom-content">
                  <div class="intro-bottom-copy">
                    <div class="intro-bottom-badge">AI Entry Portal</div>
                    <p class="intro-bottom-label">Personalized Guidance</p>
                    <p class="intro-bottom-title">Step into your career cockpit</p>
                    <p class="intro-bottom-subtitle">Open a cleaner, smarter way to explore careers, streams, and AI-guided next steps.</p>
                    <div class="intro-bottom-meta">
                      <span class="intro-bottom-chip">Smart Search</span>
                      <span class="intro-bottom-chip">AI Match</span>
                      <span class="intro-bottom-chip">Roadmaps</span>
                    </div>
                  </div>
                </div>
                <div class="intro-bottom-action">
                  <button class="ai-orb-button" data-enter-intro type="button" aria-label="Enter dashboard">
                    <span>Enter -></span>
                  </button>
                  <span class="intro-orb-label">Tap To Begin</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      const introPath = "/";
      const dashboardPath = "/dashboard";
      const activePath = window.location.pathname;
      const shouldShowIntro = activePath === introPath;

        if (shouldShowIntro) {
        const body = document.body;
        const introScreen = document.getElementById("introScreen");
        const introVideo = document.getElementById("introVideo");
        const enterOrb = document.querySelector("[data-enter-intro]");
        const introTypeLine = document.getElementById("introTypeLine");
        const introPlaybackRate = 0.55;
        const introStartTrim = 1;
        const introEndTrim = 1;
        let hasExited = false;
        let hasHeldFinalFrame = false;
        let typeTimeoutId = 0;

        body.classList.add("intro-active");
        document.documentElement.classList.remove("intro-pending");
        introScreen.setAttribute("aria-hidden", "false");

        const typePhrases = [
          "Confused about your career...",
          "Too many choices...",
          "Let CareerWiki guide your path..."
        ];

        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const introExitDuration = prefersReducedMotion ? 0 : 780;

        const triggerOrbRipple = (button) => {
          if (!button || prefersReducedMotion) return;

          const ripple = document.createElement("span");
          ripple.className = "ai-orb-ripple";
          button.appendChild(ripple);

          window.setTimeout(() => {
            ripple.remove();
          }, 560);
        };

        const nextDelay = (character, isDeleting) => {
          if (isDeleting) return 28 + Math.random() * 18;
          if (/[.,!?]/.test(character)) return 220 + Math.random() * 80;
          if (character === " ") return 36 + Math.random() * 16;
          return 48 + Math.random() * 36;
        };

        const startTypewriter = () => {
          if (!introTypeLine || prefersReducedMotion) {
            if (introTypeLine) {
              introTypeLine.textContent = typePhrases[typePhrases.length - 1];
            }
            return;
          }

          let phraseIndex = 0;
          let charIndex = 0;
          let isDeleting = false;

          const step = () => {
            if (hasExited) return;

            const phrase = typePhrases[phraseIndex];
            const nextText = phrase.slice(0, charIndex);
            introTypeLine.textContent = nextText;

            if (!isDeleting && charIndex < phrase.length) {
              charIndex += 1;
              typeTimeoutId = window.setTimeout(step, nextDelay(phrase.charAt(charIndex - 1), false));
              return;
            }

            if (!isDeleting) {
              isDeleting = true;
              typeTimeoutId = window.setTimeout(step, 1200);
              return;
            }

            if (charIndex > 0) {
              charIndex -= 1;
              typeTimeoutId = window.setTimeout(step, nextDelay(phrase.charAt(charIndex), true));
              return;
            }

            isDeleting = false;
            phraseIndex = (phraseIndex + 1) % typePhrases.length;
            typeTimeoutId = window.setTimeout(step, 260);
          };

          charIndex = 1;
          typeTimeoutId = window.setTimeout(step, 180);
        };

        const redirectToMain = () => {
          if (hasExited) return;
          hasExited = true;
          window.clearTimeout(typeTimeoutId);
          body.classList.remove("intro-held");

          if (enterOrb) {
            enterOrb.disabled = true;
          }

          window.requestAnimationFrame(() => {
            body.classList.add("intro-exiting");
          });

          window.setTimeout(() => {
            window.location.href = dashboardPath;
          }, introExitDuration);
        };

        if (introVideo) {
          // Slightly slow the intro video so the messaging is easier to absorb.
          introVideo.defaultPlaybackRate = introPlaybackRate;
          introVideo.playbackRate = introPlaybackRate;

          introVideo.addEventListener("loadedmetadata", () => {
            introVideo.defaultPlaybackRate = introPlaybackRate;
            introVideo.playbackRate = introPlaybackRate;

            // Trim the first second so the intro starts closer to the useful action.
            if (introVideo.duration > introStartTrim + introEndTrim) {
              introVideo.currentTime = introStartTrim;
            }
          });

          introVideo.addEventListener("timeupdate", () => {
            if (hasHeldFinalFrame || !introVideo.duration) return;

            const holdTime = Math.max(introStartTrim, introVideo.duration - introEndTrim);
            if (introVideo.currentTime >= holdTime) {
              hasHeldFinalFrame = true;
              introVideo.pause();
              introVideo.currentTime = holdTime;
              body.classList.add("intro-held");
            }
          });

          introVideo.addEventListener("error", redirectToMain, { once: true });
        }

        if (enterOrb) {
          enterOrb.addEventListener("click", () => {
            triggerOrbRipple(enterOrb);
            window.setTimeout(() => {
              redirectToMain();
            }, prefersReducedMotion ? 0 : 120);
          });
        }

        startTypewriter();
      } else if (activePath === dashboardPath) {
        document.documentElement.classList.remove("intro-pending");
        document.getElementById("introScreen").remove();
      }
    </script>
  </body>
</html>
