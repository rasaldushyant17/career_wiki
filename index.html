      body {
        margin: 0;
        background: var(--intro-bg);
        font-family: "Sora", "Space Grotesk", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      html,
      body {
        height: 100%;
      }

      #root {
        min-height: 100dvh;
      }

      html.intro-pending body,
      body.intro-active {
        overflow: hidden;
      }

      html.intro-pending #root,
      body.intro-active #root {
        opacity: 0;
        pointer-events: none;
        transform: scale(1.01);
        transition: opacity var(--intro-transition), transform var(--intro-transition);
      }

      .intro-screen {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: var(--intro-screen-bg);
        isolation: isolate;
        z-index: 9999;
        transform: scale(1);
        opacity: 1;
        transition: opacity var(--intro-transition), transform var(--intro-transition);
      }

      html.intro-pending .intro-screen,
      body.intro-active .intro-screen {
        display: flex;
      }

      body.intro-exiting .intro-screen {
        opacity: 0;
        transform: scale(1.035);
      }

      body.intro-exiting #root {
        opacity: 1;
        pointer-events: auto;
        transform: scale(1);
      }

      .intro-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: var(--intro-video-fit);
        object-position: var(--intro-video-position);
        display: block;
        filter: none;
        backface-visibility: hidden;
        transform: translateZ(0) scale(1);
        will-change: transform, filter;
        transition: transform var(--intro-transition), filter var(--intro-transition);
      }

      .intro-overlay {
        position: absolute;
        inset: 0;
        background: var(--intro-overlay-bg);
        pointer-events: none;
      }

      .intro-blackout {
        position: absolute;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        transition: opacity var(--intro-transition);
        z-index: 1;
      }

      body.intro-held .intro-overlay {
        background: var(--intro-overlay-held-bg);
      }

      body.intro-held .intro-video {
        transform: translateZ(0) scale(1);
        filter: none;
      }

      body.intro-held .intro-blackout {
        opacity: 0.62;
      }

      body.intro-exiting .intro-blackout {
        opacity: 0.52;
      }

      body.intro-exiting .intro-video {
        transform: translateZ(0) scale(1);
        filter: none;
      }

      body.intro-held {
        --intro-text: #ffffff;
        --intro-muted: rgba(239, 246, 255, 0.94);
        --intro-type-color: rgba(246, 252, 255, 0.98);
        --intro-label-color: rgba(230, 239, 255, 0.92);
        --intro-subtitle-color: rgba(241, 248, 255, 0.95);
        --intro-chip-color: rgba(241, 249, 255, 0.96);
      }

      body.intro-held .intro-kicker,
      body.intro-held .intro-title,
      body.intro-held .intro-type,
      body.intro-held .intro-bottom-title,
      body.intro-held .intro-bottom-subtitle,
      body.intro-held .intro-bottom-label,
      body.intro-held .intro-bottom-badge,
      body.intro-held .intro-bottom-chip,
      body.intro-held .intro-orb-label {
        text-shadow: 0 4px 16px rgba(0, 0, 0, 0.94), 0 0 20px rgba(255, 255, 255, 0.12);
      }

      body.intro-held .intro-title {
        text-shadow: 0 6px 20px rgba(0, 0, 0, 0.96), 0 0 28px rgba(180, 220, 255, 0.24);
      }

      .intro-layout {
        position: relative;
        z-index: 2;
        width: 100%;
        height: 100dvh;
        max-height: 100dvh;
        display: block;
        overflow: hidden;
      }

      .intro-media-stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: var(--intro-media-bg);
      }

      .intro-ui {
        position: absolute;
        inset: 0;
        z-index: 2;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: clamp(0.7rem, 2.2dvh, 1.05rem) clamp(0.7rem, 2.6vw, 1.4rem)
          calc(max(clamp(0.85rem, 2.4dvh, 1.05rem), env(safe-area-inset-bottom)) + 0.75rem);
        box-sizing: border-box;
        opacity: 0;
        transform: translateY(22px);
        pointer-events: none;
        will-change: opacity, transform;
        transition: opacity var(--intro-transition), transform var(--intro-transition);
      }

      body.intro-held .intro-ui {
        opacity: 1;
        transform: translateY(0);
        pointer-events: auto;
      }

      .intro-bottom-stack {
        width: min(92vw, 54rem);
        max-width: 54rem;
        max-height: min(86dvh, 38rem);
        margin: 0 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: clamp(0.45rem, 1.6dvh, 1rem);
        overflow: hidden;
        transform: translateY(0);
        transition: transform var(--intro-transition), opacity var(--intro-transition);
      }

      body.intro-compact .intro-bottom-stack {
        width: min(94vw, 42rem);
        max-height: min(88dvh, 30rem);
        gap: clamp(0.34rem, 1.2dvh, 0.75rem);
      }

      body.intro-tight .intro-bottom-stack {
        width: min(96vw, 30rem);
        max-height: min(92dvh, 22rem);
      }

      .intro-copy {
        width: 100%;
        margin: 0;
        text-align: center;
        opacity: 0;
        transform: translateY(18px);
        will-change: opacity, transform;
        transition: transform var(--intro-transition), opacity var(--intro-transition);
      }

      body.intro-held .intro-copy {
        opacity: 1;
        transform: translateY(0);
        transition-delay: var(--intro-stagger-copy);
      }

      body.intro-exiting .intro-copy {
        opacity: 0;
        transform: translateY(-10px);
      }

      .intro-kicker {
        display: inline-block;
        margin: 0 0 0.75rem;
        color: var(--intro-muted);
        font: 500 clamp(0.72rem, 0.9vw, 0.86rem) / 1 "Space Grotesk", sans-serif;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .intro-title {
        margin: 0;
        color: var(--intro-text);
        font: 700 clamp(1.6rem, 4.8vw, 3.5rem) / 1.01 "Sora", sans-serif;
        letter-spacing: -0.05em;
        text-shadow: var(--intro-title-shadow);
      }

      body.intro-compact .intro-title {
        font-size: clamp(1.15rem, 4vw, 2.45rem);
      }

      .intro-type {
        margin: clamp(0.75rem, 1.6dvh, 1rem) auto 0;
        min-height: clamp(1.2rem, 2.8dvh, 1.7rem);
        color: var(--intro-type-color);
        font: 500 clamp(0.88rem, 1.8vw, 1.18rem) / 1.35 "Space Grotesk", sans-serif;
        letter-spacing: 0.06em;
      }

      body.intro-compact .intro-type {
        margin-top: clamp(0.35rem, 1dvh, 0.72rem);
        min-height: clamp(0.95rem, 1.8dvh, 1.2rem);
        font-size: clamp(0.7rem, 1.2vw, 0.92rem);
      }

      body.intro-tight .intro-kicker,
      body.intro-tight .intro-type {
        display: none;
      }

      .intro-type::after {
        content: "";
        display: inline-block;
        width: 0.08em;
        height: 1.05em;
        margin-left: 0.18em;
        vertical-align: -0.12em;
        background: var(--intro-cursor-bg);
        box-shadow: var(--intro-cursor-shadow);
        animation: cursorBlink 1s steps(1) infinite;
      }

      body.intro-exiting .intro-bottom-stack {
        opacity: 0;
        transform: translateY(16px);
      }

      .ai-orb-button {
        position: relative;
        display: grid;
        place-items: center;
        width: clamp(4.75rem, 15vw, 8.25rem);
        height: clamp(4.75rem, 15vw, 8.25rem);
        min-width: var(--intro-touch-min);
        min-height: var(--intro-touch-min);
        padding: 0;
        border: 1px solid var(--intro-orb-border);
        border-radius: 50%;
        background: var(--intro-orb-bg);
        color: var(--intro-text);
        font: 600 clamp(0.72rem, 1.15vw, 0.96rem) / 1 "Space Grotesk", sans-serif;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: var(--intro-orb-shadow);
        backdrop-filter: blur(14px);
        overflow: hidden;
        transform: translateY(0) perspective(500px) rotateX(0deg);
        transition: transform 0.25s ease, border-color 0.25s ease, opacity 0.25s ease;
        animation: orbFloat 2.8s ease-in-out infinite;
        animation-play-state: paused;
      }

      body.intro-compact .ai-orb-button {
        width: clamp(3rem, 11vw, 5.25rem);
        height: clamp(3rem, 11vw, 5.25rem);
      }

      body.intro-tight .ai-orb-button {
        width: clamp(2.75rem, 14vw, 4rem);
        height: clamp(2.75rem, 14vw, 4rem);
        font-size: clamp(0.62rem, 2.2vw, 0.72rem);
      }

      body.intro-tight .ai-orb-button::before,
      body.intro-compact .intro-bottom-card-trace::before,
      body.intro-tight .intro-bottom-card-trace::before {
        animation: none;
      }

      .ai-orb-button > span {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        z-index: 1;
        text-align: center;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-shadow:
          0 1px 0 rgba(255, 255, 255, 0.18),
          0 3px 10px rgba(6, 10, 20, 0.7),
          0 0 18px rgba(90, 200, 250, 0.4);
      }

      .ai-orb-button::before {
        content: "";
        position: absolute;
        inset: -12%;
        border: 1px solid var(--intro-orb-ring-border);
        border-radius: 50%;
        box-shadow: var(--intro-orb-ring-shadow);
        opacity: 0.66;
        transform: scale(0.92);
        animation: orbRing 3.4s ease-in-out infinite;
        animation-play-state: paused;
      }

      .ai-orb-button::after {
        content: "";
        position: absolute;
        inset: 10%;
        border-radius: 50%;
        background: var(--intro-orb-core-bg);
        filter: blur(10px);
        opacity: 0.88;
        pointer-events: none;
      }

      .ai-orb-button:hover,
      .ai-orb-button:focus-visible {
        transform: translateY(-2px) perspective(500px) rotateX(8deg) scale(1.05);
        border-color: var(--intro-orb-hover-border);
        box-shadow: var(--intro-orb-hover-shadow);
        outline: none;
      }

      .ai-orb-button:hover::before,
      .ai-orb-button:focus-visible::before {
        opacity: 0.95;
      }

      .ai-orb-button[disabled] {
        cursor: default;
        opacity: 0.8;
        animation-play-state: paused;
      }

      body.intro-ready .ai-orb-button,
      body.intro-ready .ai-orb-button::before {
        animation-play-state: running;
      }

      body.intro-exiting .ai-orb-button {
        transform: translateY(6px) scale(0.94);
        filter: saturate(0.9);
      }

    <script>
      const introPath = "/";
      const dashboardPath = "/dashboard";
      const activePath = window.location.pathname;
      const shouldShowIntro = activePath === introPath;
      const themeParam = new URLSearchParams(window.location.search).get("introTheme");
      const introVisualPreset = themeParam === "premium" || themeParam === "premium-dark-glass"
        ? "premium-dark-glass"
        : "clean-blue";

        if (shouldShowIntro) {
        const body = document.body;
        const introScreen = document.getElementById("introScreen");
        const introVideo = document.getElementById("introVideo");
        const enterOrb = document.querySelector("[data-enter-intro]");
        const introTypeLine = document.getElementById("introTypeLine");
        const introPlaybackRate = 0.9;
        const introStartTrim = 0;
        let hasExited = false;
        let hasIntroRevealed = false;
        let hasTypewriterStarted = false;
        let revealTimeoutId = 0;
        let typeTimeoutId = 0;

        body.classList.add("intro-active");
        document.documentElement.classList.remove("intro-pending");
        if (introScreen) {
          introScreen.setAttribute("data-theme", introVisualPreset);
        }
        introScreen.setAttribute("aria-hidden", "false");

        const typePhrases = [
          "Confused about your career...",
          "Too many choices...",
          "Let CareerWiki guide your path..."
        ];

        const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const introExitDuration = prefersReducedMotion ? 0 : 220;
        const revealActionDelay = prefersReducedMotion ? 0 : 260;
        const applyViewportFit = () => {
          const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
          const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
          const viewportRatio = viewportHeight > 0 ? viewportWidth / viewportHeight : 1;
          const useCompact = viewportWidth <= 1080 || viewportHeight <= 760;
          const useTight = viewportWidth <= 430 || viewportHeight <= 620;
          const useContainVideo = viewportWidth <= 920 || viewportHeight <= 760 || viewportRatio < 1.2;

          body.classList.toggle("intro-compact", useCompact);
          body.classList.toggle("intro-tight", useTight);
          body.classList.toggle("intro-video-contain", useContainVideo);
          body.classList.toggle("intro-video-cover", !useContainVideo);
        };

        const handleViewportChange = () => {
          window.requestAnimationFrame(applyViewportFit);
        };

        applyViewportFit();
        window.addEventListener("resize", handleViewportChange, { passive: true });
        window.addEventListener("orientationchange", handleViewportChange, { passive: true });

        const setEnterReady = (ready) => {
          if (!enterOrb) return;

          enterOrb.disabled = !ready;
          enterOrb.setAttribute("aria-hidden", ready ? "false" : "true");
          enterOrb.tabIndex = ready ? 0 : -1;
          body.classList.toggle("intro-ready", ready);
        };

        setEnterReady(false);

        const triggerOrbRipple = (button) => {
          if (!button || prefersReducedMotion) return;

          const ripple = document.createElement("span");
          ripple.className = "ai-orb-ripple";
          button.appendChild(ripple);

          window.setTimeout(() => {
            ripple.remove();
          }, 560);
        };

        const nextDelay = (character, isDeleting) => {
          if (isDeleting) return 28 + Math.random() * 18;
          if (/[.,!?]/.test(character)) return 220 + Math.random() * 80;
          if (character === " ") return 36 + Math.random() * 16;
          return 48 + Math.random() * 36;
        };

        const startTypewriter = () => {
          if (hasTypewriterStarted) return;
          hasTypewriterStarted = true;

          if (!introTypeLine || prefersReducedMotion) {
            if (introTypeLine) {
              introTypeLine.textContent = typePhrases[typePhrases.length - 1];
            }
            return;
          }

          let phraseIndex = 0;
          let charIndex = 0;
          let isDeleting = false;

          const step = () => {
            if (hasExited) return;

            const phrase = typePhrases[phraseIndex];
            const nextText = phrase.slice(0, charIndex);
            introTypeLine.textContent = nextText;

            if (!isDeleting && charIndex < phrase.length) {
              charIndex += 1;
              typeTimeoutId = window.setTimeout(step, nextDelay(phrase.charAt(charIndex - 1), false));
              return;
            }

            if (!isDeleting) {
              isDeleting = true;
              typeTimeoutId = window.setTimeout(step, 1200);
              return;
            }

            if (charIndex > 0) {
              charIndex -= 1;
              typeTimeoutId = window.setTimeout(step, nextDelay(phrase.charAt(charIndex), true));
              return;
            }

            isDeleting = false;
            phraseIndex = (phraseIndex + 1) % typePhrases.length;
            typeTimeoutId = window.setTimeout(step, 260);
          };

          charIndex = 1;
          typeTimeoutId = window.setTimeout(step, 180);
        };

        const revealIntroUI = () => {
          if (hasIntroRevealed || hasExited) return;
          hasIntroRevealed = true;
          body.classList.add("intro-held");
          startTypewriter();
          window.clearTimeout(revealTimeoutId);
          revealTimeoutId = window.setTimeout(() => {
            if (hasExited) return;
            setEnterReady(true);
          }, revealActionDelay);
        };

        const redirectToMain = (immediate = false) => {
          if (hasExited) return;
          hasExited = true;
          window.removeEventListener("resize", handleViewportChange);
          window.removeEventListener("orientationchange", handleViewportChange);
          window.clearTimeout(revealTimeoutId);
          window.clearTimeout(typeTimeoutId);
          setEnterReady(false);

          window.requestAnimationFrame(() => {
            body.classList.add("intro-exiting");
          });

          const exitDelay = immediate ? 0 : introExitDuration;
          window.setTimeout(() => {
            window.location.href = dashboardPath;
          }, exitDelay);
        };

        if (introVideo) {
          introVideo.defaultPlaybackRate = introPlaybackRate;
          introVideo.playbackRate = introPlaybackRate;

          introVideo.play().catch(() => {
            revealIntroUI();
          });

          introVideo.addEventListener("loadedmetadata", () => {
            introVideo.defaultPlaybackRate = introPlaybackRate;
            introVideo.playbackRate = introPlaybackRate;

            if (introVideo.duration > introStartTrim) {
              introVideo.currentTime = introStartTrim;
            }
          });

          introVideo.addEventListener("ended", revealIntroUI, { once: true });
          introVideo.addEventListener("error", revealIntroUI, { once: true });
        } else {
          revealIntroUI();
        }

        if (enterOrb) {
          enterOrb.addEventListener("click", () => {
            triggerOrbRipple(enterOrb);
            window.setTimeout(() => {
              redirectToMain();
            }, prefersReducedMotion ? 0 : 120);
          });
        }
      } else if (activePath === dashboardPath) {
        document.documentElement.classList.remove("intro-pending");
        document.getElementById("introScreen").remove();
      }
    </script>
  </body>
</html>
